<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مواقيت الصلاة - بلسمر</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffffff">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
            padding: 15px;
        }
        .app-container {
            max-width: 100%;
            width: 100%;
            margin: 0 auto;
            box-sizing: border-box;
        }
        @media(min-width: 500px) {
            .app-container { max-width: 480px; }
        }
        .main-header {
            text-align: center;
            padding: 20px 15px;
            background: linear-gradient(135deg, #065f46, #0f766e);
            border-radius: 15px;
            margin-bottom: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .main-header h1 {
            margin: 0;
            font-size: 22px;
            color: #ffffff;
        }
        .main-header p {
            margin: 5px 0 0 0;
            font-size: 14px;
            color: #ccfbf1;
        }
        .weather-info {
            text-align: center;
            font-size: 16px;
            margin: 10px 0 0 0;
            color: #38bdf8;
            font-weight: bold;
        }
        .prayer-card {
            background-color: #1e293b;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            border-right: 4px solid #10b981;
            box-sizing: border-box;
            width: 100%;
        }
        .prayer-name {
            font-size: 18px;
            font-weight: bold;
            color: #f1f5f9;
        }
        .prayer-time {
            font-size: 18px;
            font-weight: bold;
            color: #10b981;
        }
        .audio-btn {
            background-color: #f59e0b;
            color: #0f172a;
            border: none;
            padding: 12px 20px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            box-sizing: border-box;
            display: block;
            text-align: center;
        }
        .audio-btn.active {
            background-color: #10b981;
            color: white;
        }
        .qibla-box {
            background: #1e293b; 
            color: white; 
            padding: 20px; 
            margin: 15px 0; 
            border-radius: 12px; 
            text-align: center; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            box-sizing: border-box;
            width: 100%;
        }
        .compass-ring {
            position: relative; 
            width: 120px; 
            height: 120px; 
            margin: 15px auto; 
            border: 4px solid #334155; 
            border-radius: 50%; 
            background: #0f172a;
        }
        .compass-needle {
            position: absolute; 
            top: 10%; 
            left: 50%; 
            width: 6px; 
            height: 50%; 
            background: #ef4444; 
            transform-origin: bottom center; 
            transform: translateX(-50%) rotate(0deg); 
            transition: transform 0.1s ease; 
            border-radius: 3px;
        }
        .center-dot {
            position: absolute; 
            top: 50%; 
            left: 50%; 
            width: 10px; 
            height: 10px; 
            background: #10b981; 
            border-radius: 50%; 
            transform: translate(-50%, -50%);
        }
        .action-btn {
            background: #10b981; 
            color: white; 
            border: none; 
            padding: 12px 16px; 
            border-radius: 6px; 
            font-weight: bold; 
            cursor: pointer; 
            width: 100%;
            font-size: 15px;
            box-sizing: border-box;
            display: block;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="main-header">
            <h1>مواقيت الصلاة في بلسمر</h1>
            <p id="hijri-date">جارٍ التحميل...</p>
            <div class="weather-info">درجة الحرارة الآن: <span id="temp-value">--</span> °م</div>
        </div>

        <button id="enable-audio-btn" class="audio-btn">
            <i class="fa-solid fa-bell-slash"></i> تفعيل المنبه الصوتي
        </button>

        <div class="prayer-card">
            <span class="prayer-name">الفجر</span>
            <span class="prayer-time" id="Fajr">--:--</span>
        </div>
        <div class="prayer-card">
            <span class="prayer-name">شروق الشمس</span>
            <span class="prayer-time" id="Sunrise">--:--</span>
        </div>
        <div class="prayer-card">
            <span class="prayer-name">صلاة الضحى</span>
            <span class="prayer-time" id="Dhuha">--:--</span>
        </div>
        <div class="prayer-card">
            <span class="prayer-name">الظهر</span>
            <span class="prayer-time" id="Dhuhr">--:--</span>
        </div>
        <div class="prayer-card">
            <span class="prayer-name">العصر</span>
            <span class="prayer-time" id="Asr">--:--</span>
        </div>
        <div class="prayer-card">
            <span class="prayer-name">المغرب</span>
            <span class="prayer-time" id="Maghrib">--:--</span>
        </div>
        <div class="prayer-card">
            <span class="prayer-name">العشاء</span>
            <span class="prayer-time" id="Isha">--:--</span>
        </div>
        <div class="prayer-card">
            <span class="prayer-name">منتصف الليل</span>
            <span class="prayer-time" id="Midnight">--:--</span>
        </div>
        <div class="prayer-card">
            <span class="prayer-name">الثلث الأخير</span>
            <span class="prayer-time" id="LastThird">--:--</span>
        </div>

        <div class="qibla-box">
            <h3 style="margin-top: 0; color: #10b981;">🧭 اتجاه القبلة اللحظي</h3>
            <p id="qibla-status" style="font-size: 14px;">اضغط على الزر بالأسفل لتفعيل البوصلة</p>
            
            <div class="compass-ring">
                <div id="qibla-arrow" class="compass-needle"></div>
                <div class="center-dot"></div>
            </div>

            <div style="font-size: 14px; margin-bottom: 12px;">
                <span>اتجاه جوالك الحالي: </span><span id="current-heading" style="font-weight: bold; color: #38bdf8;">--°</span>
            </div>
            
            <button id="enable-qibla-btn" class="action-btn" onclick="initQibla()">تفعيل حساس الاتجاه</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
